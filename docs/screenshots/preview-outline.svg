  <g font-family="Inter, Arial, sans-serif">
    <text x="372" y="236" fill="#F8FAFC" font-size="36" font-weight="750">产品架构</text>
    <text x="372" y="286" fill="#AAB7C4" font-size="17">MDive 将本地工作区、文件预览和 Markdown 编辑整合在一个轻量桌面窗口中。</text>
    <text x="372" y="364" fill="#F8FAFC" font-size="25" font-weight="700">工作区驱动</text>
    <text x="372" y="404" fill="#C8D2DC" font-size="16">通过文件夹组织内容，左侧文件树负责导航，顶部标签负责多文档切换。</text>
    <text x="372" y="482" fill="#F8FAFC" font-size="25" font-weight="700">实时预览</text>
    <text x="372" y="522" fill="#C8D2DC" font-size="16">编辑器内容即时渲染为预览，并支持同步滚动与 Mermaid 图表展示。</text>
    <text x="372" y="600" fill="#F8FAFC" font-size="25" font-weight="700">导出与分发</text>
    <text x="372" y="640" fill="#C8D2DC" font-size="16">预览正文可按 A4 分页导出 PDF，应用可打包为 macOS DMG。</text>
  </g>
